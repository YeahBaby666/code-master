<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - CodeMaster</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes float-1 { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes float-2 { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes float-3 { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        
        .animate-float-1 { animation: float-1 3s ease-in-out infinite; }
        .animate-float-2 { animation: float-2 4s ease-in-out infinite; animation-delay: 0.5s; }
        .animate-float-3 { animation: float-3 3.5s ease-in-out infinite; animation-delay: 1s; }

        .neon-border {
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.5), inset 0 0 15px rgba(168, 85, 247, 0.2);
            border: 1px solid rgba(168, 85, 247, 0.3);
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 h-screen flex items-center justify-center overflow-hidden selection:bg-purple-500 selection:text-white relative">

    <canvas id="matrix-canvas" class="absolute top-0 left-0 w-full h-full z-0 opacity-80"></canvas>

    <div class="relative z-10 w-full max-w-md bg-gray-900/60 backdrop-blur-md rounded-xl p-8 neon-border">
        
        <div class="flex justify-center space-x-6 mb-6 text-4xl">
            <span class="animate-float-1 drop-shadow-[0_0_10px_rgba(0,255,255,0.8)]">🤖👋</span>
            <span class="animate-float-2 drop-shadow-[0_0_10px_rgba(255,0,255,0.8)]">🗄️</span>
            <span class="animate-float-3 drop-shadow-[0_0_10px_rgba(0,255,100,0.8)]">📓</span>
        </div>

        <div class="text-center mb-6">
            <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-cyan-500 drop-shadow-[0_0_5px_rgba(168,85,247,0.8)] tracking-tight">CodeMaster</h1>
            <p class="text-sm text-purple-300 mt-2 font-mono">_Crear_Instancia_Estudiante_</p>
        </div>

        <div th:if="${error}" class="bg-red-500/20 border border-red-500 text-red-300 px-4 py-3 rounded mb-4 text-sm font-mono shadow-[0_0_10px_rgba(255,0,0,0.5)]" role="alert">
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{/auth/registro}" method="POST" class="space-y-5">
            <div>
                <label for="nombre" class="block text-xs font-mono text-purple-300 mb-1">>> Nombre_Completo</label>
                <input type="text" id="nombre" name="nombre" required
                       class="w-full px-4 py-2 bg-gray-950/80 border border-purple-800 rounded focus:ring-2 focus:ring-purple-400 focus:border-transparent outline-none transition-all text-purple-100 placeholder-gray-600 font-mono"
                       placeholder="Ej. Juan Pérez">
            </div>

            <div>
                <label for="correo" class="block text-xs font-mono text-purple-300 mb-1">>> Correo_Institucional</label>
                <input type="email" id="correo" name="correo" required
                       class="w-full px-4 py-2 bg-gray-950/80 border border-purple-800 rounded focus:ring-2 focus:ring-cyan-400 focus:border-transparent outline-none transition-all text-purple-100 placeholder-gray-600 font-mono"
                       placeholder="u12345678@utp.edu.pe">
            </div>

            <div>
                <label for="contrasena" class="block text-xs font-mono text-purple-300 mb-1">>> Contraseña_Segura</label>
                <input type="password" id="contrasena" name="contrasena" required minlength="6"
                       class="w-full px-4 py-2 bg-gray-950/80 border border-purple-800 rounded focus:ring-2 focus:ring-purple-400 focus:border-transparent outline-none transition-all text-purple-100 font-mono">
            </div>

            <button type="submit" 
                    class="w-full bg-gradient-to-r from-purple-600 to-cyan-600 hover:from-purple-500 hover:to-cyan-500 text-white font-bold py-2 px-4 rounded transition-all duration-300 shadow-[0_0_15px_rgba(168,85,247,0.5)] hover:shadow-[0_0_25px_rgba(0,255,255,0.7)] font-mono uppercase tracking-widest mt-4">
                Generar_Perfil
            </button>
        </form>

        <div class="mt-6 text-center text-sm font-mono text-gray-400">
            ¿Instancia ya generada? <br>
            <a th:href="@{/auth/login}" class="text-cyan-400 hover:text-purple-300 transition-colors drop-shadow-[0_0_5px_rgba(0,255,255,0.8)]">_Iniciar_Conexión</a>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const chars = '01010101987654321<>{}[]/\\'.split('');
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = [];
        
        for(let x = 0; x < columns; x++) drops[x] = 1;

        let hue = 250; // Inicia en un tono más morado para la vista de registro

        function draw() {
            ctx.fillStyle = 'rgba(17, 24, 39, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            hue = (hue + 0.5) % 360;
            ctx.fillStyle = `hsl(${hue}, 100%, 75%)`;
            ctx.font = fontSize + 'px monospace';

            for(let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                
                if(drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(draw, 35);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
