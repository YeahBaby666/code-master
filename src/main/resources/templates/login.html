
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mini Aula Virtual</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { padding: 20px; }
    .quiz-card { margin-top: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="text-center text-primary">🌐 Aula Virtual UTP</h1>
    <p class="lead text-center">Contenido educativo estático con un toque dinámico</p>

    <!-- Sección de contenido estático -->
    <div class="card">
      <div class="card-body">
        <h3>Concepto: Energía Cinética</h3>
        <p>La energía cinética es la energía que posee un objeto debido a su movimiento.</p>
        <p><strong>Fórmula:</strong> <code>Ec = 1/2 · m · v²</code></p>
      </div>
    </div>

    <!-- Sección dinámica con JS -->
    <div class="quiz-card card">
      <div class="card-body">
        <h4>Mini Quiz</h4>
        <p id="question">¿Qué significa Ec en la fórmula?</p>
        <button class="btn btn-outline-primary" onclick="checkAnswer('energía cinética')">Energía cinética</button>
        <button class="btn btn-outline-danger" onclick="checkAnswer('masa')">Masa</button>
        <button class="btn btn-outline-warning" onclick="checkAnswer('velocidad')">Velocidad</button>
        <p id="feedback" class="mt-3"></p>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS + propio -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function checkAnswer(answer) {
      const feedback = document.getElementById('feedback');
      if (answer === 'energía cinética') {
        feedback.innerHTML = "✅ Correcto: Ec es energía cinética.";
        feedback.className = "text-success";
      } else {
        feedback.innerHTML = "❌ Incorrecto. Intenta de nuevo.";
        feedback.className = "text-danger";
      }
    }
  </script>
</body>
</html>
